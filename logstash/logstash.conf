input {
  syslog {
    port => 5044
    codec => json_lines
    type => "nginx"
  }

  syslog {
    port => 5045
    codec => json_lines
    type => "django"
  }
  syslog {
    port => 5043
    type => "postgresql"
  }
}

filter {
  if [type] == "nginx" {
    grok {
      match => { "message" => "%{SYSLOGBASE} %{GREEDYDATA:message}" }
    }
  }

  if [type] == "django" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:loglevel} %{GREEDYDATA:message}" }
    }
  }
  if [type] == "postgresql" {
    grok {
      match => { "message" => "%{SYSLOGLINE}" }
    }
  }
}

output {
  if [type] == "nginx" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      index => "nginx-%{+YYYY.MM.dd}"
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      cacert => "/usr/share/logstash/certs/ca/ca.crt"
      ssl => true
    }
  }

  if [type] == "django" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      index => "django-%{+YYYY.MM.dd}"
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      cacert => "/usr/share/logstash/certs/ca/ca.crt"
      ssl => true
    }
  }

  if [type] == "postgresql" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      index => "postgres-%{+YYYY.MM.dd}"
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      cacert => "/usr/share/logstash/certs/ca/ca.crt"
      ssl => true
    }
  }
}

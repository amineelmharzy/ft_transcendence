version: '3.9'

networks:
  transcendence:
    name: transcendence
    driver: bridge
  monitoring:
    name: monitoring
    driver: bridge
  elastic:
    name: elastic
    driver: bridge

services:
  db:
    image: postgres:latest
    container_name: db
    environment:
      POSTGRES_DB: transcendence
      POSTGRES_PASSWORD: password
      POSTGRES_USER: pfister
      POSTGRES_LOGGING_COLLECTOR: "off"
      POSTGRES_SYSLOG_FACILITY: "LOCAL0"
      POSTGRES_SYSLOG_IDENT: "postgres"
    volumes:
      - postgresdata:/var/lib/postgresql/data
      #- ./postgresql.conf:/etc/postgresql/postgresql.conf
    #command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    shm_size: 128mb
    depends_on:
      logstash:
        condition: service_healthy
    networks:
      - transcendence
    restart: unless-stopped
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/default:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      logstash:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - transcendence
      - elastic
    restart: unless-stopped
  backend:
    build:
      context: ./backend
    image: backend:latest
    container_name: backend
    depends_on:
      logstash:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - transcendence
      - monitoring
      - elastic
    restart: unless-stopped
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command: "--nginx.scrape-uri=http://nginx:80/stub_status"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - transcendence
      - monitoring
    restart: unless-stopped
  node_exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - monitoring
    restart: unless-stopped
  postgres_exporter:
    image: wrouesnel/postgres_exporter
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://pfister:password@db:5432/transcendence?sslmode=disable
    networks:
      - transcendence
      - monitoring
    restart: unless-stopped
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    ports:
      - "9090:9090"
    volumes:
      - prometheusdata:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules:/etc/prometheus/alert.rules
    depends_on:
      - backend
      - nginx-exporter
      - postgres_exporter
      - alertmanager
    networks:
      - monitoring
    restart: unless-stopped
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/config/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/config/ssl:/etc/grafana/ssl:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped
  elasticsearch:
    depends_on:
      setup:
        condition: service_healthy
    environment:
      ELASTIC_PASSWORD: changeme
      bootstrap.memory_lock: "true"
      cluster.name: docker-cluster
      discovery.type: single-node
      node.name: elasticsearch
      xpack.license.self_generated.type: basic
      xpack.security.enabled: "true"
      xpack.security.http.ssl.certificate: certs/elasticsearch/elasticsearch.crt
      xpack.security.http.ssl.certificate_authorities: certs/ca/ca.crt
      xpack.security.http.ssl.enabled: "true"
      xpack.security.http.ssl.key: certs/elasticsearch/elasticsearch.key
      xpack.security.transport.ssl.certificate: certs/elasticsearch/elasticsearch.crt
      xpack.security.transport.ssl.certificate_authorities: certs/ca/ca.crt
      xpack.security.transport.ssl.enabled: "true"
      xpack.security.transport.ssl.key: certs/elasticsearch/elasticsearch.key
      xpack.security.transport.ssl.verification_mode: certificate
    healthcheck:
      interval: 10s
      retries: 120
      test:
      - CMD-SHELL
      - curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing
        authentication credentials'
      timeout: 10s
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    labels:
      co.elastic.logs/module: elasticsearch
    mem_limit: '1073741824'
    ports:
    - published: 9200
      target: 9200
    ulimits:
      memlock:
        hard: -1
        soft: -1
    volumes:
      - certs:/usr/share/elasticsearch/config/certs:rw
      - elasticdata:/usr/share/elasticsearch/data:rw
    networks:
      - elastic
  kibana:
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: https://elasticsearch:9200
      ELASTICSEARCH_PASSWORD: changeme
      ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES: config/certs/ca/ca.crt
      ELASTICSEARCH_USERNAME: kibana_system
      SERVERNAME: kibana
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: c34d38b3a14956121ff2170e5030b471551370178f43e5626eec58b04a30fae2
      XPACK_REPORTING_ENCRYPTIONKEY: c34d38b3a14956121ff2170e5030b471551370178f43e5626eec58b04a30fae2
      XPACK_SECURITY_ENCRYPTIONKEY: c34d38b3a14956121ff2170e5030b471551370178f43e5626eec58b04a30fae2
    healthcheck:
      interval: 10s
      retries: 120
      test:
      - CMD-SHELL
      - curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'
      timeout: 10s
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    labels:
      co.elastic.logs/module: kibana
    mem_limit: '1073741824'
    ports:
      - "5601:5601"
    volumes:
      - certs:/usr/share/kibana/config/certs:rw
      - kibanadata:/usr/share/kibana/data:rw
    networks:
      - elastic
  setup:
    command: >
     bash -c '
       if [ x${ELASTIC_PASSWORD} == x ]; then
         echo "Set the ELASTIC_PASSWORD environment variable in the .env file";
         exit 1;
       elif [ x${KIBANA_PASSWORD} == x ]; then
         echo "Set the KIBANA_PASSWORD environment variable in the .env file";
         exit 1;
       fi;
       if [ ! -f config/certs/ca.zip ]; then
         echo "Creating CA";
         bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
         unzip config/certs/ca.zip -d config/certs;
       fi;
       if [ ! -f config/certs/certs.zip ]; then
         echo "Creating certs";
         echo -ne \
         "instances:\n"\
         "  - name: elasticsearch\n"\
         "    dns:\n"\
         "      - elasticsearch\n"\
         "      - localhost\n"\
         "    ip:\n"\
         "      - 127.0.0.1\n"\
         "  - name: kibana\n"\
         "    dns:\n"\
         "      - kibana\n"\
         "      - localhost\n"\
         "    ip:\n"\
         "      - 127.0.0.1\n"\
         "  - name: logstash\n"\
         "    dns:\n"\
         "      - logstash\n"\
         "      - localhost\n"\
         "    ip:\n"\
         "      - 127.0.0.1\n"\
         > config/certs/instances.yml;
         bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
         unzip config/certs/certs.zip -d config/certs;
       fi;
       echo "Setting file permissions"
       chown -R root:root config/certs;
       find . -type d -exec chmod 750 \{\} \;;
       find . -type f -exec chmod 640 \{\} \;;
       echo "Waiting for Elasticsearch availability";
       until curl -s --cacert config/certs/ca/ca.crt https://elasticsearch:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
       echo "Setting kibana_system password";
       until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 10; done;
       echo "All done!";
     '
    healthcheck:
      interval: 1s
      retries: 120
      test:
      - CMD-SHELL
      - '[ -f config/certs/elasticsearch/elasticsearch.crt ]'
      timeout: 5s
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elksetup
    user: '0'
    volumes:
    - certs:/usr/share/elasticsearch/config/certs:rw
  logstash:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: logstash
    labels:
      co.elastic.logs/module: logstash
    user: root
    volumes:
      - certs:/usr/share/logstash/certs
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=changeme
      - ELASTIC_HOSTS=https://elasticsearch:9200
    networks:
      - elastic
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5043' || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  postgresdata:
    name: postgresdata
    driver: local
  prometheusdata:
    name: prometheusdata
    driver: local
  grafanadata:
    name: grafanadata
    driver: local
  certs:
    name: certs
    driver: local
  elasticdata:
    name: elasticdata
    driver: local
  kibanadata:
    name: kibanadata
    driver: local
